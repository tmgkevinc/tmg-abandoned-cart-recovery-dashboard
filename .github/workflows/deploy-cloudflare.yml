name: Deploy Cloudflare Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Verify JavaScript syntax
        run: npm run check

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TEAM_API_KEY_DASHBOARD_EDITOR: ${{ secrets.TEAM_API_KEY_DASHBOARD_EDITOR }}
        run: |
          normalize_secret() {
            value="$1"
            case "$value" in
              *=*) value="${value##*=}" ;;
            esac
            value="${value#Bearer }"
            value="${value#bearer }"
            printf '%s' "$value" | tr -d '\r\n[:space:]' | sed "s/^['\"]//;s/['\"]$//"
          }
          export CLOUDFLARE_API_TOKEN="$(normalize_secret "$CLOUDFLARE_API_TOKEN")"
          export CLOUDFLARE_ACCOUNT_ID="$(normalize_secret "$CLOUDFLARE_ACCOUNT_ID")"
          export TEAM_API_KEY_DASHBOARD_EDITOR="$(normalize_secret "$TEAM_API_KEY_DASHBOARD_EDITOR")"
          npx wrangler deploy
          printf '%s' "$TEAM_API_KEY_DASHBOARD_EDITOR" | npx wrangler secret put TEAM_API_KEY_DASHBOARD_EDITOR
          npx wrangler deploy
